# Apply this config only on desktop computers that run Manjaro

- shell:
  - command: ln -fs theme.local.zsh zsh/theme.zsh
    stdin: true
    stdout: true
    description: Linking zsh theme to local machine variant
    quiet: true
  - 
    command: sudo pacman --noconfirm -Syyu
    stdin: true
    stdout: true
    description: Updating the system 
    quiet: true
  -
    command: cat packages/{always,gui} | grep -v '#' | xargs sudo pacman --noconfirm -S
    stdin: true
    stdout: true
    description: Installing packages
    quiet: true

- defaults:
    link:
      relink: true
      create: true
      force: true

- link:
    ~/.Xresources:
    ~/.config/i3:
    ~/.config/rofi:
    ~/.config/conky:
    ~/.config/alacritty:
    ~/.config/dunst:
    # Remove the compton config once everything adopts picom
    ~/.config/compton.conf: compton/compton.conf
    ~/.config/picom.conf: picom/picom.conf
    ~/.config/systemd/user/:
        path: systemd/user/*
        glob: true
    ~/.config/xsettingsd:
    ~/.config/gtk-3.0: gtk/gtk-3.0
    ~/.config/gtk-4.0: gtk/gtk-4.0
    # TODO: why not link the entire dirs here as well, is there a downside?
    ~/.local/share/themes/prefer-light: gtk/themes/prefer-light
    ~/.local/share/themes/prefer-dark: gtk/themes/prefer-dark
    ~/.local/share/icons/prefer-light: gtk/icons/prefer-light
    ~/.local/share/icons/prefer-dark: gtk/icons/prefer-dark
